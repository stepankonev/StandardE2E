name: Security Scan

on:
  schedule:
    # Run weekly security scans on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  security:
    name: Security Check
    runs-on: ubuntu-slim
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        uv sync
        uv pip install safety bandit
    
    - name: Run dependency security check
      run: uv run safety check
      continue-on-error: true
    
    - name: Run code security scan
      run: uv run bandit -r standard_e2e/ --exclude=standard_e2e/third_party/ -ll
      continue-on-error: true
