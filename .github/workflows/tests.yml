name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-slim
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Ensure lockfile is up to date
      run: uv lock --check
      continue-on-error: false

    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ matrix.python-version }}-
          ${{ runner.os }}-uv-
    
    - name: Install dependencies
      run: uv sync --all-extras
    
    - name: Run tests
      run: uv run pytest tests/ -v --cov --cov-report=xml
    
    - name: Verify coverage file exists
      run: |
        ls -la coverage.xml
        echo "Coverage file size: $(wc -c < coverage.xml) bytes"
        head -20 coverage.xml
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Code Quality
    runs-on: ubuntu-slim
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache uv dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-lint-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-lint-
          ${{ runner.os }}-uv-
    
    - name: Install dependencies
      run: uv sync --all-extras
    
    - name: Check code formatting (black)
      run: uv run black --check --diff standard_e2e/ tests/ --exclude="standard_e2e/third_party/"
    
    - name: Check import sorting (isort)
      run: uv run isort --check-only --diff standard_e2e/ tests/ --skip-glob="standard_e2e/third_party/*"
    
    - name: Lint code (flake8)
      run: uv run flake8 standard_e2e/ tests/ --max-line-length=88 --extend-ignore=E203,W503 --exclude=standard_e2e/third_party/

    - name: Type check (mypy)
      run: uv run mypy standard_e2e/
