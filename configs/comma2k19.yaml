preprocessing:
  # comma2k19 ships a single forward camera + ego pose (no lidar, HD map,
  # detections, or driving command). The past/future ego trajectories are added
  # by the FuturePastStatesFromMatrices context aggregator (the processor's
  # default), not a per-frame adapter.
  adapters:
    # The native 1164x874 frame passes through. Add `params: {max_size: N}` to
    # downscale its longest side to N px (intrinsics scaled to match) and cut
    # output size.
    - name: cameras_identity_adapter
dataset:
  features:
    - frame_name: current_sensors
      modalities:
        - cameras
        - past_states
      selector:
        name: current
  labels:
    - frame_name: current_future_states
      modalities:
        - future_states
      selector:
        name: current
    - frame_name: future_1second
      modalities:
        - future_states
      selector:
        name: closest_timestamp
        parameters:
          delta_t: 1.0
